<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bloqueios em Anestesia Oftalmológica</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg-card: #131826;
    --bg-elev: #1a2033;
    --border: #243049;
    --text: #e8ecf4;
    --text-dim: #8a93a8;
    --accent: #40c8d0;
    --accent-dim: #2a8a8f;
    --danger: #e85a6a;
    --safe-top: env(safe-area-inset-top);
    --safe-bot: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    font-size: 16px;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .h-title {
    font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
  }
  .h-sub {
    font-size: 12px; color: var(--text-dim); margin-top: 2px;
  }

  /* ===== LISTA DE BLOQUEIOS ===== */
  .blocks-list { padding: 12px 16px calc(var(--safe-bot) + 32px); }

  .block-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .block-card:active { transform: scale(0.98); border-color: var(--accent-dim); }

  .block-title {
    font-size: 17px; font-weight: 600; margin-bottom: 4px;
  }
  .block-desc {
    font-size: 13px; color: var(--text-dim); line-height: 1.4;
  }
  .block-meta {
    display: flex; gap: 12px; margin-top: 10px;
    font-size: 12px; color: var(--text-dim);
  }
  .meta-item { display: inline-flex; align-items: center; gap: 4px; }

  /* ===== SPLASH SCREEN ===== */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: radial-gradient(ellipse at center, #131826 0%, #0a0e1a 70%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    opacity: 1;
    transition: opacity 0.5s ease-out;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }

  .splash-logo {
    width: 110px; height: 110px;
    border-radius: 28px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    box-shadow: 0 10px 40px rgba(64, 200, 208, 0.25),
                0 0 0 1px rgba(255,255,255,0.05) inset;
    animation: logoEntry 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes logoEntry {
    0%   { opacity: 0; transform: scale(0.6); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Ícone do olho em SVG inline (sem dependência externa) */
  .splash-logo svg {
    width: 60px; height: 60px;
    color: #0a0e1a;
  }

  .splash-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 6px;
    animation: textEntry 0.6s ease-out 0.3s both;
  }
  .splash-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 32px;
    animation: textEntry 0.6s ease-out 0.45s both;
  }
  .splash-doctor {
    font-size: 15px;
    color: var(--text);
    text-align: center;
    font-weight: 500;
    letter-spacing: 0.3px;
    animation: textEntry 0.6s ease-out 0.6s both;
  }
  .splash-doctor-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
    animation: textEntry 0.6s ease-out 0.6s both;
  }
  @keyframes textEntry {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .splash-tap {
    position: absolute;
    bottom: calc(var(--safe-bot) + 50px);
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0;
    animation: tapPulse 1.8s ease-in-out 1s infinite;
  }
  @keyframes tapPulse {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.9; }
  }

  #splash { cursor: pointer; }

  /* ===== TELA DE DETALHE ===== */
  .detail {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.25s ease-out;
    -webkit-overflow-scrolling: touch;
  }
  .detail.open { transform: translateX(0); }

  .detail-header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .back-btn {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    cursor: pointer;
  }
  .detail-title { font-size: 16px; font-weight: 600; }

  .detail-body { padding: 16px calc(var(--safe-bot) + 16px); }

  /* ===== PLAYER ===== */
  .video-wrapper {
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    aspect-ratio: 16 / 9;
  }
  .video-wrapper video {
    width: 100%; height: 100%;
    display: block;
    background: #000;
  }
  .video-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }

  /* ===== SEÇÕES DE CONTEÚDO ===== */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .section-text {
    font-size: 14px; line-height: 1.55; color: var(--text);
  }
  .section-text ul { padding-left: 18px; margin: 6px 0; }
  .section-text li { margin-bottom: 4px; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tag {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<!-- ===== SPLASH SCREEN ===== -->
<div id="splash">
  <div class="splash-logo">
    <!-- Ícone de olho estilizado -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3" fill="currentColor"/>
    </svg>
  </div>
  <div class="splash-title">Bloqueios em<br>Anestesia Oftalmológica</div>
  <div class="splash-subtitle">Guia clínico ilustrado</div>
  <div class="splash-doctor-label">Autoria</div>
  <div class="splash-doctor">Dra. Angela Henrique</div>
  <div class="splash-tap">Toque para continuar</div>
</div>

<header>
  <div class="h-title">Bloqueios em Anestesia Oftalmológica</div>
  <div class="h-sub">Dra. Angela Henrique • Guia clínico ilustrado</div>
</header>

<main class="blocks-list" id="blocksList">
  <!-- Cards gerados pelo JS -->
</main>

<!-- ===== TELA DE DETALHE ===== -->
<div class="detail" id="detailScreen">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitle">—</div>
  </div>
  <div class="detail-body" id="detailBody">
    <!-- Conteúdo gerado pelo JS -->
  </div>
</div>

<script>
/* ============================================================
   DADOS DOS BLOQUEIOS
   - video: caminho relativo do arquivo offline (pasta /videos/)
   - se o arquivo não existir, mostra placeholder elegante
   ============================================================ */
const BLOCKS = [
  {
    id: 'peribulbar',
    title: 'Bloqueio Peribulbar',
    desc: 'Injeção extraconal — técnica de eleição para a maioria das cirurgias oftalmológicas.',
    duration: '~3 min',
    video: 'videos/peribulbar.mp4',
    indicacoes: [
      'Facoemulsificação',
      'Cirurgia de catarata',
      'Cirurgia vitreorretiniana',
      'Cirurgia de glaucoma'
    ],
    tecnica: 'Punção inferotemporal com agulha 25G, 25 mm. Avanço perpendicular à pele até ultrapassar o equador do globo, então redirecionamento medial e cranial. Aspiração obrigatória antes da injeção.',
    volume: '6 a 8 mL — anestésico local (bupivacaína 0,5% + lidocaína 2%) + hialuronidase 15 UI/mL',
    riscos: ['Hemorragia retrobulbar', 'Perfuração do globo (raro)', 'Injeção intravascular', 'Bloqueio do tronco encefálico (excepcional)'],
    tags: ['Extraconal', 'Agulhado', '25G']
  },
  {
    id: 'retrobulbar',
    title: 'Bloqueio Retrobulbar',
    desc: 'Injeção intraconal clássica — anestesia profunda e acinesia completa.',
    duration: '~3 min',
    video: 'videos/retrobulbar.mp4',
    indicacoes: [
      'Cirurgias longas',
      'Vitrectomia posterior',
      'Cirurgia escleral'
    ],
    tecnica: 'Punção inferotemporal, agulha 25G, 31 mm. Avanço com inclinação superomedial após cruzar o equador do globo, entrando no cone muscular. Aspiração rigorosa.',
    volume: '3 a 5 mL',
    riscos: ['Hemorragia retrobulbar', 'Perfuração do globo', 'Bloqueio do tronco encefálico', 'Lesão do nervo óptico'],
    tags: ['Intraconal', 'Agulhado', '25G']
  },
  {
    id: 'sub-tenon',
    title: 'Bloqueio Sub-Tenoniano',
    desc: 'Acesso à cápsula de Tenon com cânula romba — perfil de segurança alto.',
    duration: '~4 min',
    video: 'videos/sub-tenon.mp4',
    indicacoes: [
      'Catarata em paciente com mioptia alta',
      'Pacientes anticoagulados (relativo)',
      'Quando se evita agulhado'
    ],
    tecnica: 'Anestesia tópica prévia. Pinçar a conjuntiva no quadrante inferonasal, pequena incisão com tesoura de Westcott, passagem da cânula sub-Tenoniana romba seguindo a curvatura do globo até o quadrante posterior.',
    volume: '3 a 5 mL',
    riscos: ['Quemose', 'Hemorragia subconjuntival', 'Risco baixíssimo de perfuração'],
    tags: ['Sub-Tenoniano', 'Cânula romba', 'Seguro']
  },
  {
    id: 'topico',
    title: 'Anestesia Tópica + Intracameral',
    desc: 'Colírio anestésico + injeção na câmara anterior — facoemulsificação rápida.',
    duration: '~2 min',
    video: 'videos/topico.mp4',
    indicacoes: [
      'Facoemulsificação não-complexa',
      'Paciente colaborativo',
      'Cirurgião experiente'
    ],
    tecnica: 'Instilação de colírio de tetracaína 1% ou proximetacaína 0,5%, 3 gotas com intervalo de 1 min. Complementação intracameral com lidocaína 1% sem conservante (0,1 a 0,2 mL).',
    volume: 'Tópico + 0,1–0,2 mL intracameral',
    riscos: ['Toxicidade endotelial se conservante presente', 'Anestesia insuficiente em casos complexos'],
    tags: ['Tópico', 'Sem agulha', 'Colaborativo']
  }
];

/* ============================================================
   RENDERIZAÇÃO DA LISTA
   ============================================================ */
function renderList() {
  const list = document.getElementById('blocksList');
  list.innerHTML = BLOCKS.map(b => `
    <div class="block-card" onclick="openDetail('${b.id}')">
      <div class="block-title">${b.title}</div>
      <div class="block-desc">${b.desc}</div>
      <div class="block-meta">
        <span class="meta-item">▶ ${b.duration}</span>
        <span class="meta-item">${b.tags[0]}</span>
      </div>
    </div>
  `).join('');
}

/* ============================================================
   ABRIR DETALHE COM VÍDEO
   - tenta carregar o vídeo local
   - se falhar, mostra placeholder sem quebrar nada
   ============================================================ */
function openDetail(id) {
  const block = BLOCKS.find(b => b.id === id);
  if (!block) return;

  document.getElementById('detailTitle').textContent = block.title;

  const body = document.getElementById('detailBody');
  body.innerHTML = `
    <div class="video-wrapper">
      <video
        id="videoPlayer"
        controls
        playsinline
        webkit-playsinline
        preload="metadata"
        onerror="handleVideoError(this)"
      >
        <source src="${block.video}" type="video/mp4">
      </video>
    </div>

    <div class="section">
      <div class="section-title">Indicações</div>
      <div class="section-text">
        <ul>${block.indicacoes.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Técnica</div>
      <div class="section-text">${block.tecnica}</div>
    </div>

    <div class="section">
      <div class="section-title">Volume e Solução</div>
      <div class="section-text">${block.volume}</div>
    </div>

    <div class="section">
      <div class="section-title">Riscos e Complicações</div>
      <div class="section-text">
        <ul>${block.riscos.map(r => `<li>${r}</li>`).join('')}</ul>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Tags</div>
      <div class="tag-row">
        ${block.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    </div>
  `;

  document.getElementById('detailScreen').classList.add('open');
}

function handleVideoError(videoEl) {
  // Substitui o player por placeholder caso o vídeo não exista ainda
  const wrapper = videoEl.parentElement;
  wrapper.innerHTML = `
    <div class="video-placeholder">
      Vídeo ainda não disponível.<br>
      Coloque o arquivo em <code>/videos/</code> e recarregue.
    </div>
  `;
}

function closeDetail() {
  const video = document.getElementById('videoPlayer');
  if (video) { video.pause(); }
  document.getElementById('detailScreen').classList.remove('open');
}

/* Init */
renderList();

/* Splash screen: aguarda toque do usuário pra continuar */
document.getElementById('splash').addEventListener('click', () => {
  const splash = document.getElementById('splash');
  splash.classList.add('fade-out');
  // Remove do DOM após o fade pra não bloquear toques
  setTimeout(() => splash.remove(), 600);
});
</script>

</body>
</html>
